version: 2.1

jobs:
  bazel-build-all:
    docker:
      - image: docker.io/envoyproxy/envoy-build@sha256:afe3addcdb7a5177bcca77d041f079acf4a6c5fb32701aadb2ab96fd0933e0b2
    steps:
      - checkout
      - run:
          name: Bazel environment
          command: |
            bazel --version
            bazel info release
      - run:
          name: Build as much as possible with Bazel
          no_output_timeout: 30m
          command: |
            set -euo pipefail

            # Keep going so we can capture as many build results as possible.
            bazel build \
              --config=clang \
              --config=ci \
              --keep_going \
              -- \
              //... \
              -//distribution/... \
              -//tools/dependency:cves-scanned &
            bazel_pid=$!

            echo "[fd-monitor] Started Bazel with pid=${bazel_pid}"
            echo "[fd-monitor] Sampling open file descriptors every 30s"

            (
              while kill -0 "${bazel_pid}" 2>/dev/null; do
                ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                if [ -d "/proc/${bazel_pid}/fd" ]; then
                  fd_count=$(ls -1 "/proc/${bazel_pid}/fd" 2>/dev/null | wc -l | tr -d ' ')
                  fd_limit=$(awk '/Max open files/ {print $4 "/" $5}' "/proc/${bazel_pid}/limits" 2>/dev/null || echo "unknown")
                  echo "[fd-monitor] ${ts} bazel_pid=${bazel_pid} open_fds=${fd_count} max_open_files=${fd_limit}"
                else
                  echo "[fd-monitor] ${ts} /proc/${bazel_pid}/fd unavailable"
                fi
                sleep 30
              done
            ) &
            fd_monitor_pid=$!

            set +e
            wait "${bazel_pid}"
            bazel_exit=$?
            set -e

            kill "${fd_monitor_pid}" 2>/dev/null || true
            wait "${fd_monitor_pid}" 2>/dev/null || true

            echo "[fd-monitor] Bazel exited with code ${bazel_exit}"
            exit "${bazel_exit}"

workflows:
  bazel:
    jobs:
      - bazel-build-all
